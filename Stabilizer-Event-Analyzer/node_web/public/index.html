<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Stabilizer Event Analyzer</title>
    <link rel="stylesheet" href="/styles.css?v=__ASSET_VERSION__">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>Stabilizer Event Analyzer</h1>
          <p id="configText"></p>
        </div>
        <span id="versionText" class="version-badge"></span>
      </header>

      <main class="layout">
        <section class="panel side-panel">
          <div class="panel-header">
            <h2>Sources</h2>
          </div>
          <div class="button-row">
            <button id="selectExportFilesButton" type="button">Select FCP Source</button>
            <button id="lastAnalysisButton" type="button" disabled>Last Analysis</button>
          </div>
          <div id="exportsList" class="exports-list"></div>
        </section>

        <section class="panel main-panel">
          <div class="panel-header">
            <h2>Event Media</h2>
            <span id="sourceText" class="muted"></span>
          </div>
          <label class="field">
            <span>FCP Library (.fcpbundle), FCPXMLD, or Info.fcpxml path</span>
            <input id="sourcePathInput" type="text" autocomplete="off">
          </label>
          <div class="button-row">
            <button id="loadAssetsButton" type="button">Load Event Media</button>
            <button id="selectAllButton" type="button">Select All Supported</button>
            <button id="clearSelectionButton" type="button">Clear</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th></th>
                  <th>Source</th>
                  <th>Name</th>
                  <th>Event</th>
                  <th>Duration</th>
                  <th>Format</th>
                  <th>Media</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="assetsBody"></tbody>
            </table>
          </div>
        </section>

        <div class="right-column">
          <section class="panel run-panel">
            <div class="panel-header">
              <h2>Run</h2>
              <span id="selectedText" class="muted">No media selected</span>
            </div>
            <label class="field">
              <span>Imports</span>
              <input id="cacheRootInput" type="text" autocomplete="off" readonly>
              <small class="field-help">
                Choose the package output folder, not an FCPXMLD or JSON file. Per-clip package folders with FCPXMLD, manifest, and analysis-cache will be created here for restore or reuse.
              </small>
            </label>
            <div class="button-row">
              <button id="selectCacheRootButton" type="button">Select Imports</button>
            </div>
            <label class="field">
              <span>Sample size</span>
              <select id="sampleScaleInput">
                <option value="100" selected>100%</option>
                <option value="75">75%</option>
                <option value="50">50%</option>
                <option value="25">25%</option>
                <option value="10">10%</option>
              </select>
            </label>
            <div class="button-row">
              <button id="runButton" class="primary-button" type="button" disabled>Run Serial Analysis</button>
              <button id="cancelButton" type="button" class="hidden">Cancel</button>
            </div>
            <div id="statusBox" class="status-box"></div>
            <div id="readyImports" class="batch-summary hidden"></div>
            <div id="batchSummary" class="batch-summary hidden"></div>
            <div id="resultActions" class="button-row hidden">
              <button id="revealCacheButton" type="button">Reveal Cache</button>
            </div>
          </section>

          <section class="panel restore-panel">
            <div class="panel-header">
              <h2>Restore</h2>
              <span class="muted">Install saved cache</span>
            </div>
            <label class="field">
              <span>Package folder</span>
              <input id="restorePackagePathInput" type="text" autocomplete="off" placeholder="/path/to/stabilizer_analysis/...package folder">
              <small class="field-help">
                Select the per-clip package folder, not the FCPXMLD. The folder must contain one analysis-manifest JSON file and its analysis-cache directory.
              </small>
            </label>
            <div class="button-row">
              <button id="selectRestorePackageButton" type="button">Select Package Folder</button>
              <button id="loadRestorePackageButton" type="button">Load Path</button>
              <button id="installRestorePackageButton" class="primary-button" type="button" disabled>Install Cache</button>
            </div>
            <div id="restoreSummary" class="restore-summary hidden"></div>
            <div id="restoreStatusBox" class="status-box compact-status"></div>
            <div class="button-row restore-actions">
              <button id="revealRestorePackageButton" type="button" disabled>Reveal Package</button>
              <button id="revealInstalledCacheButton" type="button" disabled>Reveal Installed Cache</button>
              <button id="openRestoreImportButton" type="button" disabled>Open FCPXMLD</button>
            </div>
          </section>
        </div>
      </main>
    </div>
    <script src="/version.js?v=__ASSET_VERSION__"></script>
    <script src="/app.js?v=__ASSET_VERSION__"></script>
  </body>
</html>
